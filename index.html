<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gudang Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f1f5f9;margin:0}
.container{max-width:900px;margin:auto;padding:10px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
input,select{padding:8px;margin:4px 0;border:1px solid #ccc;border-radius:6px;width:100%}
button{padding:8px;border:none;border-radius:6px;cursor:pointer}
.btn{background:#2563eb;color:#fff}
.btn-red{background:#dc2626;color:#fff}

table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;font-size:14px}
th{background:#e0f2fe}
</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
</div>

<div id="app" style="display:none">

<div class="card">
<button onclick="logout()" style="float:right">Logout</button>
<h3>Input Barang</h3>

<input id="kode" placeholder="Kode" oninput="autoIsi()">
<input id="nama" placeholder="Nama">
<input id="harga" placeholder="Harga/CRT">
<input id="isi" placeholder="Isi/CRT (24)">
<input id="jumlah" placeholder="Jumlah">

<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<button class="btn" onclick="simpan('masuk')">Masuk</button>
<button class="btn-red" onclick="simpan('keluar')">Keluar</button>
</div>

<div class="card">
<h3>Stok</h3>
<input id="cari" placeholder="Cari..." oninput="render()">

<table>
<thead>
<tr>
<th>No</th><th>Kode</th><th>Nama</th><th>Stok</th><th>Harga</th><th>Nilai</th>
</tr>
</thead>
<tbody id="list"></tbody>
<tfoot>
<tr><td colspan="5">Total</td><td id="totalHarga">Rp 0</td></tr>
</tfoot>
</table>
</div>

<div class="card">
<h3>Laporan Hari Ini</h3>
<div id="laporan"></div>
</div>

</div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let user=null,data=[],riwayat=[];

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

// REGISTER
function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

// AUTH
auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  loginBox.style.display="none";
  app.style.display="block";
  load();
 }else{
  loginBox.style.display="block";
  app.style.display="none";
 }
});

function logout(){auth.signOut();}

// LOAD DATA
function load(){

 db.collection("gudang").doc(user.uid).collection("stok")
 .onSnapshot(s=>{
  data=[];
  s.forEach(d=>data.push({...d.data(),id:d.id}));
  render();
 });

 db.collection("gudang").doc(user.uid).collection("riwayat")
 .onSnapshot(s=>{
  riwayat=[];
  s.forEach(d=>riwayat.push(d.data()));
  renderLaporan();
 });
}

// AUTO ISI
function autoIsi(){
 let item=data.find(x=>x.id==kode.value);
 if(item){
  nama.value=item.nama;
  harga.value=item.harga;
  isi.value=item.isi;
 }
}

// SIMPAN
function simpan(jenis){

 let isiVal=parseInt(isi.value)||24;
 let jumlahVal=parseInt(jumlah.value)||0;

 let lama=data.find(x=>x.id==kode.value);

 let namaVal=nama.value.trim()||(lama?lama.nama:"");
 let hargaVal=parseInt(harga.value)||(lama?lama.harga:0);

 if(!kode.value||!namaVal||hargaVal<=0||jumlahVal<=0){
  alert("Data salah");
  return;
 }

 let qty=satuan.value=="CRT"?jumlahVal*isiVal:jumlahVal;

 let ref=db.collection("gudang").doc(user.uid).collection("stok").doc(kode.value);

 db.runTransaction(async t=>{
  let doc=await t.get(ref);
  let stok=doc.exists?doc.data().stok:0;

  let baru=jenis=="masuk"?stok+qty:stok-qty;

  if(baru<0){alert("Stok kurang");return;}

  t.set(ref,{nama:namaVal,stok:baru,harga:hargaVal,isi:isiVal});

  db.collection("gudang").doc(user.uid).collection("riwayat").add({
   kode:kode.value,
   nama:namaVal,
   jenis,
   qty,
   isi:isiVal,
   waktu:firebase.firestore.FieldValue.serverTimestamp()
  });

 });

 kode.value="";nama.value="";harga.value="";jumlah.value="";isi.value="";
}

// FORMAT
function rp(x){return "Rp "+Math.round(x).toLocaleString("id-ID");}

// RENDER
function render(){

 let key=cari.value.toLowerCase();
 let html="",total=0,no=1;

 data.filter(x=>!key||x.nama.toLowerCase().includes(key)||x.id.includes(key))
 .forEach(d=>{

  let isi=d.isi||24;
  let harga=d.harga||0;

  let crt=Math.floor(d.stok/isi);
  let pcs=d.stok%isi;

  let nilai=d.stok*(harga/isi);

  total+=nilai;

  html+=`
  <tr>
  <td>${no++}</td>
  <td>${d.id}</td>
  <td>${d.nama}</td>
  <td>${crt} crt + ${pcs} pcs</td>
  <td>${rp(harga)}</td>
  <td>${rp(nilai)}</td>
  </tr>`;
 });

 list.innerHTML=html;
 totalHarga.innerText=rp(total);
}

// LAPORAN
function renderLaporan(){

 let today=new Date();
 today.setHours(0,0,0,0);

 let map={};

 riwayat.forEach(x=>{

  let waktu=x.waktu?.toDate?x.waktu.toDate():new Date(x.waktu);
  if(waktu<today)return;

  if(!map[x.kode]) map[x.kode]={nama:x.nama,masuk:0,keluar:0,isi:x.isi||24};

  if(x.jenis=="masuk") map[x.kode].masuk+=x.qty;
  else map[x.kode].keluar+=x.qty;

 });

 let html="";

 Object.values(map).forEach(d=>{
  let m=Math.floor(d.masuk/d.isi),mp=d.masuk%d.isi;
  let k=Math.floor(d.keluar/d.isi),kp=d.keluar%d.isi;

  html+=`<div>
  <b>${d.nama}</b><br>
  Masuk: ${m} crt + ${mp} pcs<br>
  Keluar: ${k} crt + ${kp} pcs
  </div><hr>`;
 });

 laporan.innerHTML=html||"Belum ada transaksi";
}

</script>

</body>
</html>
