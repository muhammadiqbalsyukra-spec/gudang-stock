<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudang Stok</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.container{max-width:900px;margin:auto;padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px}
input,select{padding:8px;margin:3px;border:1px solid #ccc;border-radius:5px}
button{padding:8px 10px;border:none;border-radius:5px;cursor:pointer}
.btn{background:#2563eb;color:#fff}
.btn-red{background:red;color:#fff}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:left}
th{background:#eee}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Input Barang</h3>

<input id="kode" placeholder="Kode Barang">
<input id="nama" placeholder="Nama Barang">
<input id="harga" placeholder="Harga (PCS)">
<input id="jumlah" placeholder="Jumlah">
<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<button class="btn" onclick="simpan('masuk')">Barang Masuk</button>
<button class="btn-red" onclick="simpan('keluar')">Barang Keluar</button>

</div>

<div class="card">
<h3>Stok Barang</h3>

<input id="cari" placeholder="Cari barang..." oninput="render()">
<button onclick="printData()">Print</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td colspan="4"><b>Total Nilai Stok</b></td>
<td colspan="2" id="totalHarga">Rp 0</td>
</tr>
</tfoot>

</table>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let data=[];

// LOAD DATA
db.collection("gudang").doc("main").collection("stok")
.onSnapshot(snap=>{
 data=[];
 snap.forEach(d=>data.push({...d.data(),id:d.id}));
 render();
});

// SIMPAN
function simpan(jenis){

 let kodeVal=kode.value;
 let namaVal=nama.value;
 let hargaVal=parseInt(harga.value)||0;
 let jumlahVal=parseInt(jumlah.value)||0;

 if(!kodeVal||!namaVal||jumlahVal<=0){
  alert("Isi lengkap");
  return;
 }

 let isi=24; // default CRT
 let qty = satuan.value=="CRT" ? jumlahVal*isi : jumlahVal;

 let ref=db.collection("gudang").doc("main").collection("stok").doc(kodeVal);

 db.runTransaction(async t=>{
   let doc=await t.get(ref);
   let stokLama=doc.exists?doc.data().stok:0;

   let stokBaru = jenis=="masuk" ? stokLama+qty : stokLama-qty;

   if(stokBaru<0){
     alert("Stok kurang");
     return;
   }

   t.set(ref,{
     nama:namaVal,
     stok:stokBaru,
     harga:hargaVal
   });
 });

 kode.value="";
 nama.value="";
 harga.value="";
 jumlah.value="";
}

// RENDER
function render(){

 let key=cari.value.toLowerCase();
 let html="", no=1, total=0;

 data
 .filter(x=>x.nama.toLowerCase().includes(key)||x.id.includes(key))
 .forEach(d=>{

   let crt=Math.floor(d.stok/24);
   let pcs=d.stok%24;

   let stokText = `${d.stok} pcs (${crt} crt + ${pcs} pcs)`;

   let sub=d.stok*d.harga;
   total+=sub;

   html+=`
   <tr>
   <td>${no++}</td>
   <td>${d.id}</td>
   <td>${d.nama}</td>
   <td>${stokText}</td>
   <td>Rp ${d.harga}</td>
   <td><button onclick="hapus('${d.id}')">Hapus</button></td>
   </tr>`;
 });

 list.innerHTML=html;
 totalHarga.innerText="Rp "+total;
}

// HAPUS
function hapus(id){
 if(confirm("Hapus barang?")){
  db.collection("gudang").doc("main").collection("stok").doc(id).delete();
 }
}

// PRINT
function printData(){
 let w=window.open("");
 w.document.write(document.querySelector("table").outerHTML);
 w.print();
}

</script>

</body>
</html>
