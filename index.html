<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudang Stok</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f4f6f9;}
header{background:#2563eb;color:#fff;padding:15px;text-align:center;}
.container{padding:10px;padding-bottom:90px;max-width:700px;margin:auto;}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid #ddd;}
button{padding:10px;border:none;border-radius:10px;margin-top:5px;}
.btn{background:#2563eb;color:white;width:100%;}
.btn-red{background:#ef4444;color:white;}
.btn-small{padding:6px 10px;font-size:12px;margin:2px;}
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#fff;padding:10px;}
.page{display:none;}
.page.active{display:block;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#e5e7eb;}
tfoot td{font-weight:bold;}
.top-actions{display:flex;gap:6px;margin-bottom:6px;}
.top-actions button{flex:1;}
</style>
</head>

<body>

<header>📦 Gudang Stok</header>

<div class="container">

<!-- LOGIN -->
<div id="loginPage" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="register()">Daftar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<!-- INPUT -->
<div id="pageInput" class="page active">
<div class="card">

<button class="btn" onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>

<input id="barcode" placeholder="Barcode">
<input id="nama" placeholder="Nama barang">

<select id="jenis">
<option value="masuk">Barang Masuk</option>
<option value="keluar">Barang Keluar</option>
</select>

<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<input id="isi" type="number" placeholder="Isi per CRT (contoh 24)">
<input id="jumlah" type="number" placeholder="Jumlah">

<!-- 🔥 Tambahan harga -->
<input id="harga" type="number" placeholder="Harga PCS (opsional)">
<input id="harga_crt" type="number" placeholder="Harga CRT (opsional)">

<button class="btn" onclick="simpan()">Simpan</button>

</div>
</div>

<!-- STOK -->
<div id="pageStok" class="page">

<input id="cari" placeholder="Cari barang..." oninput="renderStok()">

<div class="top-actions">
<button class="btn-small" onclick="printStok()">Print / PDF</button>
<button class="btn-small btn-red" onclick="hapusDipilih()">Hapus Dipilih</button>
</div>

<table>
<thead>
<tr>
<th></th>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga</th>
<th>Total</th>
</tr>
</thead>

<tbody id="listStok"></tbody>

<tfoot>
<tr>
<td colspan="5">TOTAL NILAI</td>
<td colspan="2" id="grandTotal">Rp 0</td>
</tr>
</tfoot>

</table>

</div>

</div>
</div>

<div class="navbar">
<button onclick="showPage('Input')">Input</button>
<button onclick="showPage('Stok')">Stok</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null, dataStok=[];
let scanner=null;

// AUTH
function login(){
 auth.signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}
function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  loginPage.style.display="none";
  app.style.display="block";
  loadStok();
 }else{
  loginPage.style.display="block";
  app.style.display="none";
 }
});

// NAV
function showPage(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.getElementById("page"+p).classList.add("active");
 stopScanner();
}

// SCANNER
function startScanner(){
 stopScanner();
 scanner=new Html5Qrcode("reader");
 scanner.start({ facingMode:"environment" },{ fps:10, qrbox:250 },text=>{
  barcode.value=text;
  stopScanner();
 });
}
function stopScanner(){
 if(scanner){
  scanner.stop().catch(()=>{});
  scanner=null;
  reader.innerHTML="";
 }
}

// 🔥 SIMPAN
function simpan(){
 let code=barcode.value;
 let namaBarang=nama.value;
 let jumlahInput=parseInt(jumlah.value)||0;
 let isiPerCrt=parseInt(isi.value)||1;

 if(!code || !namaBarang || jumlahInput<=0){
  alert("Lengkapi data");
  return;
 }

 let qty = satuan.value=="CRT" ? jumlahInput*isiPerCrt : jumlahInput;

 let ref = db.collection("gudang").doc(user.uid).collection("stok").doc(code);

 db.runTransaction(async t=>{
   let doc = await t.get(ref);

   let stokLama = doc.exists ? doc.data().stok : 0;
   let stokBaru = jenis.value=="masuk"
     ? stokLama + qty
     : stokLama - qty;

   if(stokBaru < 0){
     alert("Stok tidak cukup");
     return;
   }

   t.set(ref,{
     nama:namaBarang,
     stok:stokBaru,
     isi:isiPerCrt,
     harga:parseInt(harga.value)||0,
     harga_crt:parseInt(harga_crt.value)||0
   });
 });

 alert("Tersimpan");
}

// LOAD
function loadStok(){
 db.collection("gudang").doc(user.uid).collection("stok")
 .onSnapshot(snap=>{
   dataStok=[];
   snap.forEach(d=>dataStok.push({...d.data(),barcode:d.id}));
   renderStok();
 });
}

// 🔥 RENDER TABLE
function renderStok(){
 let keyword=cari.value?cari.value.toLowerCase():"";
 let html="", no=1, grand=0;

 dataStok
 .filter(x=>x.nama.toLowerCase().includes(keyword)||x.barcode.includes(keyword))
 .forEach(d=>{

   let isi=d.isi||1;
   let crt=Math.floor(d.stok/isi);
   let pcs=d.stok%isi;

   let stokText=crt>0?(pcs>0?`${crt} crt ${pcs} pcs`:`${crt} crt`):`${pcs} pcs`;

   let hargaPcs=d.harga_crt?d.harga_crt/isi:d.harga;
   let total=d.stok*hargaPcs;
   grand+=total;

   html+=`
   <tr>
   <td><input type="checkbox" value="${d.barcode}"></td>
   <td>${no++}</td>
   <td>${d.barcode}</td>
   <td>${d.nama}</td>
   <td>${stokText}</td>
   <td>Rp ${Math.round(hargaPcs)}</td>
   <td>Rp ${Math.round(total)}</td>
   </tr>`;
 });

 listStok.innerHTML=html||"<tr><td colspan='7'>Kosong</td></tr>";
 grandTotal.innerText="Rp "+Math.round(grand);
}

// 🔥 HAPUS
function hapusDipilih(){
 let cek=document.querySelectorAll("#listStok input:checked");
 cek.forEach(c=>{
  db.collection("gudang").doc(user.uid)
  .collection("stok").doc(c.value).delete();
 });
}

// 🔥 PRINT
function printStok(){
 let isi=document.querySelector("table").outerHTML;
 let w=window.open("");
 w.document.write("<html><body>"+isi+"</body></html>");
 w.print();
}

</script>

</body>
</html>
