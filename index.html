<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gudang Stok</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.container{max-width:900px;margin:auto;padding:10px}
.card{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px}
input,select{padding:8px;margin:3px;border:1px solid #ccc;border-radius:5px}
button{padding:8px 10px;border:none;border-radius:5px;cursor:pointer}
.btn{background:#2563eb;color:#fff}
.btn-red{background:red;color:#fff}

table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #ccc;padding:8px;text-align:left}
th{background:#dbeafe}
tfoot{background:#f1f5f9;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Input Barang</h3>

<input id="kode" placeholder="Kode Barang" oninput="autoIsi()">
<input id="nama" placeholder="Nama Barang">
<input id="harga" placeholder="Harga / CRT">
<input id="jumlah" placeholder="Jumlah">
<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<button class="btn" onclick="simpan('masuk')">Barang Masuk</button>
<button class="btn-red" onclick="simpan('keluar')">Barang Keluar</button>

</div>

<div class="card">
<h3>Stok Barang</h3>

<input id="cari" placeholder="Cari barang..." oninput="render()">

<div style="display:flex;gap:10px;margin:10px 0">
<button onclick="printData()">Print</button>
<button class="btn-red" onclick="hapusDipilih()">Hapus Dipilih</button>
</div>

<table>
<thead>
<tr>
<th></th>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga/CRT</th>
<th>Nilai</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td colspan="6">Total Nilai Stok</td>
<td id="totalHarga">Rp 0</td>
</tr>
</tfoot>
</table>

</div>

<div class="card">
<h3>📊 Laporan Hari Ini</h3>
<div id="laporan"></div>
</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let data = [];
let riwayat = [];

// LOAD STOK
db.collection("gudang").doc("main").collection("stok")
.onSnapshot(snap=>{
 data=[];
 snap.forEach(d=>data.push({...d.data(),id:d.id}));
 render();
});

// LOAD RIWAYAT
db.collection("gudang").doc("main").collection("riwayat")
.onSnapshot(snap=>{
 riwayat=[];
 snap.forEach(d=>riwayat.push(d.data()));
 renderLaporan();
});

// FORMAT RUPIAH
function rupiah(angka){
 return "Rp " + Math.round(angka).toLocaleString("id-ID");
}

// AUTO ISI BARANG
function autoIsi(){
 let val = kode.value;
 let item = data.find(x=>x.id == val);
 if(item){
   nama.value = item.nama;
   harga.value = item.harga;
 }
}

// SIMPAN
function simpan(jenis){

 let kodeVal=kode.value;
 let namaVal=nama.value;
 let hargaVal=parseInt(harga.value)||0;
 let jumlahVal=parseInt(jumlah.value)||0;

 if(!kodeVal||!namaVal||jumlahVal<=0){
  alert("Isi lengkap");
  return;
 }

 let isi=24;
 let qty = satuan.value=="CRT" ? jumlahVal*isi : jumlahVal;

 let ref=db.collection("gudang").doc("main").collection("stok").doc(kodeVal);

 db.runTransaction(async t=>{
   let doc=await t.get(ref);
   let stokLama=doc.exists?doc.data().stok:0;

   let stokBaru = jenis=="masuk" ? stokLama+qty : stokLama-qty;

   if(stokBaru<0){
     alert("Stok kurang");
     return;
   }

   t.set(ref,{
     nama:namaVal,
     stok:stokBaru,
     harga:hargaVal
   });

   // SIMPAN RIWAYAT
   db.collection("gudang").doc("main").collection("riwayat").add({
     jenis:jenis,
     qty:qty,
     waktu:new Date()
   });

 });

 kode.value="";
 nama.value="";
 harga.value="";
 jumlah.value="";
}

// RENDER TABEL
function render(){

 let key=cari.value.trim().toLowerCase();
 let html="", no=1, total=0;

 data
 .filter(x=>x.nama.toLowerCase().includes(key)||x.id.includes(key))
 .forEach(d=>{

   let isi=24;
   let crt=Math.floor(d.stok/isi);
   let pcs=d.stok%isi;

   let stokText=`${crt} crt + ${pcs} pcs`;

   let hargaPcs = d.harga / isi;
   let nilai = d.stok * hargaPcs;

   total += nilai;

   html+=`
   <tr>
   <td><input type="checkbox" value="${d.id}"></td>
   <td>${no++}</td>
   <td>${d.id}</td>
   <td>${d.nama}</td>
   <td>${stokText}</td>
   <td>${rupiah(d.harga)}</td>
   <td>${rupiah(nilai)}</td>
   </tr>`;
 });

 list.innerHTML=html;
 totalHarga.innerText=rupiah(total);
}

// HAPUS AMAN
function hapusDipilih(){

 let cek = document.querySelectorAll("#list input:checked");

 if(cek.length==0){
   alert("Pilih data dulu");
   return;
 }

 let konfirmasi = prompt("Ketik HAPUS untuk melanjutkan");

 if(konfirmasi !== "HAPUS"){
   alert("Dibatalkan");
   return;
 }

 cek.forEach(c=>{
  db.collection("gudang").doc("main")
  .collection("stok").doc(c.value).delete();
 });

 alert("Data berhasil dihapus");
}

// PRINT RAPI
function printData(){

 let rows=document.querySelectorAll("#list tr");

 let html=`
 <html><body>
 <h3>Data Stok</h3>
 <table border="1" style="border-collapse:collapse;width:100%">
 <tr>
 <th>No</th><th>Kode</th><th>Nama</th>
 <th>Stok</th><th>Harga</th><th>Nilai</th>
 </tr>
 `;

 rows.forEach(r=>{
   let td=r.querySelectorAll("td");
   html+=`
   <tr>
   <td>${td[1].innerText}</td>
   <td>${td[2].innerText}</td>
   <td>${td[3].innerText}</td>
   <td>${td[4].innerText}</td>
   <td>${td[5].innerText}</td>
   <td>${td[6].innerText}</td>
   </tr>`;
 });

 html+=`</table><h3>${totalHarga.innerText}</h3></body></html>`;

 let w=window.open("");
 w.document.write(html);
 w.print();
}

// LAPORAN HARIAN CRT + PCS
function renderLaporan(){

 let hariIni = new Date().toDateString();
 let masuk=0, keluar=0;

 riwayat.forEach(x=>{
   let tgl=new Date(x.waktu.seconds*1000).toDateString();

   if(tgl==hariIni){
     if(x.jenis=="masuk") masuk+=x.qty;
     else keluar+=x.qty;
   }
 });

 let isi=24;

 let mCrt=Math.floor(masuk/isi);
 let mPcs=masuk%isi;

 let kCrt=Math.floor(keluar/isi);
 let kPcs=keluar%isi;

 laporan.innerHTML=`
 Barang Masuk: ${mCrt} crt + ${mPcs} pcs<br>
 Barang Keluar: ${kCrt} crt + ${kPcs} pcs
 `;
}

</script>

</body>
</html>
