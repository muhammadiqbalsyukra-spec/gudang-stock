<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Toko</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding:20px; }

input, select, button { padding:8px; margin:5px; }

table {
  border-collapse: collapse;
  width:100%;
  margin-top:10px;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
}

th { background:#f5f5f5; }

tr:nth-child(even){ background:#fafafa; }

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appPage" class="hidden">

<h2>📦 Input Barang</h2>
<input id="kode" placeholder="Kode">
<input id="nama" placeholder="Nama">
<input id="harga" type="number" placeholder="Harga">
<input id="jumlah" type="number" placeholder="Jumlah">

<select id="satuan">
<option value="pcs">PCS</option>
<option value="crt">CRT</option>
</select>

<button onclick="tambah()">Masuk</button>
<button onclick="keluar()">Keluar</button>

<hr>

<h2>📋 Stok Barang</h2>

<input id="search" placeholder="🔍 Cari..." onkeyup="renderData()">

<br>

<button onclick="printStok()">🖨️ Print / PDF</button>
<button onclick="toggleHapus()">🗑️ Hapus</button>
<button onclick="hapusTerpilih()" id="btnHapus" style="display:none;">✔ Hapus Dipilih</button>
<button onclick="laporanHarian()">📊 Laporan Harian</button>

<div id="areaPrint">
<table id="tabel">
<thead>
<tr>
<th></th>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td colspan="4" align="right"><b>Total</b></td>
<td><b id="totalHarga">Rp 0</b></td>
<td></td>
</tr>
</tfoot>

</table>
</div>

</div>

<script>
// LOGIN
function login(){
  if(user.value=="admin" && pass.value=="1234"){
    loginPage.classList.add("hidden");
    appPage.classList.remove("hidden");
  } else alert("Salah");
}

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// FORMAT
function rupiah(a){ return "Rp "+a.toLocaleString("id-ID"); }

// MODE HAPUS
let modeHapus = false;

function toggleHapus(){
  modeHapus = !modeHapus;
  btnHapus.style.display = modeHapus ? "inline-block" : "none";
  renderData();
}

// AUTO ISI
kode.onkeyup=async()=>{
  let doc=await db.collection("barang").doc(kodeVal()).get();
  if(doc.exists){
    nama.value=doc.data().nama_barang;
    harga.value=doc.data().harga;
  }
};

// MASUK
async function tambah(){
  let k=kodeVal(), n=nama.value, h=+harga.value, j=+jumlah.value;
  let t=(satuan.value=="crt")?j*24:j;

  let ref=db.collection("barang").doc(k);
  let doc=await ref.get();

  if(doc.exists){
    await ref.update({stok:(doc.data().stok||0)+t});
  } else {
    await ref.set({nama_barang:n,harga:h,stok:t});
  }

  await db.collection("transaksi").add({
    tipe:"masuk",
    jumlah:t,
    tanggal:new Date()
  });
}

// KELUAR
async function keluar(){
  let k=kodeVal(), j=+jumlah.value;
  let t=(satuan.value=="crt")?j*24:j;

  let ref=db.collection("barang").doc(k);
  let doc=await ref.get();

  if(!doc.exists) return alert("Tidak ada");
  let s=doc.data().stok;
  if(s<t) return alert("Kurang");

  await ref.update({stok:s-t});

  await db.collection("transaksi").add({
    tipe:"keluar",
    jumlah:t,
    tanggal:new Date()
  });
}

// DATA
let semuaData=[];
db.collection("barang").onSnapshot(snap=>{
  semuaData=[];
  snap.forEach(d=>semuaData.push({id:d.id,...d.data()}));
  renderData();
});

// RENDER
function renderData(){
  list.innerHTML="";
  let key=search.value.toLowerCase();
  let total=0, no=1;

  semuaData.forEach(d=>{
    if(d.nama_barang.toLowerCase().includes(key)||d.id.includes(key)){

      let crt=Math.floor(d.stok/24);
      let pcs=d.stok%24;

      let stok = crt>0 ? (pcs>0 ? `${crt} crt + ${pcs} pcs` : `${crt} crt`) : `${pcs} pcs`;

      total+=d.stok*d.harga;

      list.innerHTML+=`
      <tr>
        <td>${modeHapus ? `<input type="checkbox" value="${d.id}">` : ""}</td>
        <td>${no++}</td>
        <td>${d.id}</td>
        <td>${d.nama_barang}</td>
        <td>${stok}</td>
        <td>${rupiah(d.harga)}</td>
      </tr>`;
    }
  });

  totalHarga.innerHTML=rupiah(total);
}

// HAPUS
function hapusTerpilih(){
  let cek=document.querySelectorAll("input[type=checkbox]:checked");
  cek.forEach(c=>{
    db.collection("barang").doc(c.value).delete();
  });
}

// PRINT (FIX TABEL)
function printStok(){
  const isi = document.getElementById("tabel").innerHTML;

  const win = window.open('', '', 'width=900,height=700');
  win.document.write(`
    <html>
    <head>
    <style>
    body{font-family:Arial;padding:20px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid black;padding:8px}
    th{background:#eee}
    </style>
    </head>
    <body>
    <h2>STOK BARANG</h2>
    <table>${isi}</table>
    </body>
    </html>
  `);

  win.document.close();
  win.print();
}

// LAPORAN HARIAN
async function laporanHarian(){
  const today = new Date();
  today.setHours(0,0,0,0);

  const snap = await db.collection("transaksi").get();

  let masuk=0, keluar=0;

  snap.forEach(doc=>{
    let d=doc.data();
    let tgl=d.tanggal.toDate();

    if(tgl >= today){
      if(d.tipe=="masuk") masuk+=d.jumlah;
      if(d.tipe=="keluar") keluar+=d.jumlah;
    }
  });

  alert(
    "📊 LAPORAN HARI INI\n\n" +
    "Masuk: "+masuk+"\n" +
    "Keluar: "+keluar+"\n" +
    "Sisa: lihat tabel"
  );
}

// HELPER
function kodeVal(){ return kode.value.trim(); }
</script>

</body>
</html>
