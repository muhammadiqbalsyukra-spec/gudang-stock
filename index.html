<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Gudang Stok</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.container{max-width:900px;margin:auto;padding:10px}
.card{background:#fff;padding:12px;margin-bottom:10px;border-radius:10px}
input,select{padding:8px;margin:4px;border:1px solid #ccc;border-radius:6px;width:100%}
button{padding:8px 10px;border:none;border-radius:6px;cursor:pointer}
.btn{background:#2563eb;color:#fff}
.btn-red{background:red;color:#fff}

table{width:100%;border-collapse:collapse;font-size:14px}
th,td{border:1px solid #ccc;padding:8px}
th{background:#dbeafe}
tfoot{background:#f1f5f9;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login / Daftar</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="card">
<button onclick="logout()" style="float:right">Logout</button>
<h3>Input Barang</h3>

<input id="kode" placeholder="Kode Barang" oninput="autoIsi()">
<input id="nama" placeholder="Nama Barang">
<input id="harga" placeholder="Harga / CRT">
<input id="isi" placeholder="Isi / CRT (contoh 24)">
<input id="jumlah" placeholder="Jumlah">

<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<button class="btn" onclick="simpan('masuk')">Barang Masuk</button>
<button class="btn-red" onclick="simpan('keluar')">Barang Keluar</button>

</div>

<div class="card">
<h3>Stok Barang</h3>

<input id="cari" placeholder="Cari barang..." oninput="render()">
<button onclick="resetCari()">Reset</button>

<div style="display:flex;gap:10px;margin:10px 0">
<button onclick="printData()">Print</button>
<button class="btn-red" onclick="hapusDipilih()">Hapus Dipilih</button>
</div>

<table>
<thead>
<tr>
<th></th>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga/CRT</th>
<th>Nilai</th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td colspan="6">Total Nilai Stok</td>
<td id="totalHarga">Rp 0</td>
</tr>
</tfoot>
</table>

</div>

<div class="card">
<h3>📊 Laporan Hari Ini</h3>
<div id="laporan"></div>
</div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user=null;
let data=[];
let riwayat=[];

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

// REGISTER
function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
 auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(u=>{
 if(u){
   user=u;
   loginBox.style.display="none";
   app.style.display="block";
   loadData();
 }else{
   loginBox.style.display="block";
   app.style.display="none";
 }
});

// LOAD DATA
function loadData(){

 db.collection("gudang").doc(user.uid).collection("stok")
 .onSnapshot(snap=>{
  data=[];
  snap.forEach(d=>data.push({...d.data(),id:d.id}));
  render();
 });

 db.collection("gudang").doc(user.uid).collection("riwayat")
 .onSnapshot(snap=>{
  riwayat=[];
  snap.forEach(d=>riwayat.push(d.data()));
  renderLaporan();
 });

}

// FORMAT
function rupiah(x){
 return "Rp " + Math.round(x).toLocaleString("id-ID");
}

// AUTO ISI
function autoIsi(){
 let item=data.find(x=>x.id==kode.value);
 if(item){
  nama.value=item.nama;
  harga.value=item.harga||0;
  isi.value=item.isi||24;
 }
}

// SIMPAN
function simpan(jenis){

 let isiVal=parseInt(isi.value)||24;
 let jumlahVal=parseInt(jumlah.value)||0;

 if(!kode.value||!nama.value||jumlahVal<=0){
  alert("Isi lengkap");
  return;
 }

 let qty=satuan.value=="CRT"?jumlahVal*isiVal:jumlahVal;

 let ref=db.collection("gudang").doc(user.uid).collection("stok").doc(kode.value);

 db.runTransaction(async t=>{
  let doc=await t.get(ref);
  let stokLama=doc.exists?doc.data().stok:0;

  let stokBaru=jenis=="masuk"?stokLama+qty:stokLama-qty;
  if(stokBaru<0){alert("Stok kurang");return;}

  t.set(ref,{
   nama:nama.value,
   stok:stokBaru,
   harga:parseInt(harga.value)||0,
   isi:isiVal
  });

  db.collection("gudang").doc(user.uid).collection("riwayat").add({
   kode:kode.value,
   nama:nama.value,
   jenis:jenis,
   qty:qty,
   isi:isiVal||24,
   waktu:new Date()
  });

 });

 kode.value="";nama.value="";harga.value="";jumlah.value="";isi.value="";
}

// RENDER
function render(){
 let key=cari.value.toLowerCase();
 let html="",total=0,no=1;

 data.filter(x=>!key||x.nama.toLowerCase().includes(key)||x.id.includes(key))
 .forEach(d=>{

  let isi=d.isi||24;
  let hargaCrt=d.harga||0;

  let crt=Math.floor(d.stok/isi);
  let pcs=d.stok%isi;

  let hargaPcs=hargaCrt/isi;
  let nilai=d.stok*hargaPcs;

  total+=nilai;

  html+=`
  <tr>
  <td><input type="checkbox" value="${d.id}"></td>
  <td>${no++}</td>
  <td>${d.id}</td>
  <td>${d.nama}</td>
  <td>${crt} crt + ${pcs} pcs</td>
  <td>${rupiah(hargaCrt)}</td>
  <td>${rupiah(nilai)}</td>
  </tr>`;
 });

 list.innerHTML=html;
 totalHarga.innerText=rupiah(total);
}

// RESET
function resetCari(){
 cari.value="";
 render();
}

// HAPUS AMAN
function hapusDipilih(){
 let cek=document.querySelectorAll("#list input:checked");
 if(cek.length==0)return alert("Pilih data");

 let konfirmasi=prompt("Ketik HAPUS");
 if(konfirmasi!="HAPUS")return;

 cek.forEach(c=>{
  db.collection("gudang").doc(user.uid)
  .collection("stok").doc(c.value).delete();
 });
}

// PRINT
function printData(){
 let w=window.open("");
 w.document.write(document.querySelector("table").outerHTML);
 w.print();
}

// LAPORAN
function renderLaporan(){

 let hariIni=new Date().toDateString();
 let map={};

 riwayat.forEach(x=>{
  let tgl=new Date(x.waktu.seconds*1000).toDateString();
  if(tgl!=hariIni)return;

  if(!map[x.kode])map[x.kode]={nama:x.nama,masuk:0,keluar:0,isi:x.isi||24};

  if(x.jenis=="masuk")map[x.kode].masuk+=x.qty;
  else map[x.kode].keluar+=x.qty;
 });

 let html="";

 Object.values(map).forEach(d=>{
  let isi=d.isi||24;

  let mCrt=Math.floor(d.masuk/isi);
  let mPcs=d.masuk%isi;

  let kCrt=Math.floor(d.keluar/isi);
  let kPcs=d.keluar%isi;

  html+=`
  <b>${d.nama}</b><br>
  Masuk: ${mCrt} crt + ${mPcs} pcs<br>
  Keluar: ${kCrt} crt + ${kPcs} pcs<br><br>`;
 });

 laporan.innerHTML=html||"Belum ada transaksi hari ini";
}

</script>

</body>
</html>
