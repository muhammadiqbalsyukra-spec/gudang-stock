<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gudang Stok</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f4f6f9;}
header{background:#2563eb;color:#fff;padding:15px;text-align:center;}
.container{padding:10px;padding-bottom:80px;max-width:600px;margin:auto;}
.card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px;}
input,select{width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:10px;border:none;border-radius:10px;margin-top:5px;}
.btn{background:#2563eb;color:white;}
.btn-out{background:#ef4444;color:white;}
.navbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#fff;padding:10px;}
.page{display:none;}
.page.active{display:block;}
</style>
</head>

<body>

<header>📦 Gudang Stok</header>

<div class="container">

<div id="loginPage" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<button onclick="register()">Daftar</button>
</div>

<div id="app" style="display:none">

<!-- INPUT -->
<div id="pageInput" class="page active">
<div class="card">

<button class="btn" onclick="startScanner()">📷 Scan Barcode</button>
<div id="reader"></div>

<input id="barcode" placeholder="Barcode">
<input id="nama" placeholder="Nama barang">

<select id="jenis">
<option value="masuk">Barang Masuk</option>
<option value="keluar">Barang Keluar</option>
</select>

<select id="satuan">
<option value="PCS">PCS</option>
<option value="CRT">CRT</option>
</select>

<input id="isi" type="number" placeholder="Isi per CRT (contoh 24)">
<input id="jumlah" type="number" placeholder="Jumlah">

<button class="btn" onclick="simpan()">Simpan</button>

</div>
</div>

<!-- STOK -->
<div id="pageStok" class="page">
<input id="cari" placeholder="Cari barang..." oninput="renderStok()">
<div id="listStok"></div>
</div>

<!-- RIWAYAT -->
<div id="pageRiwayat" class="page">
<div id="laporan" class="card"></div>
<div id="listRiwayat"></div>
</div>

</div>
</div>

<div class="navbar">
<button onclick="showPage('Input')">Input</button>
<button onclick="showPage('Stok')">Stok</button>
<button onclick="showPage('Riwayat')">Riwayat</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let user=null, dataStok=[], dataRiwayat=[];
let scanner=null;

// AUTH
function login(){
 auth.signInWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}
function register(){
 auth.createUserWithEmailAndPassword(email.value,password.value)
 .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(u=>{
 if(u){
  user=u;
  loginPage.style.display="none";
  app.style.display="block";
  loadStok();
  loadRiwayat();
 }else{
  loginPage.style.display="block";
  app.style.display="none";
 }
});

// NAV
function showPage(p){
 document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
 document.getElementById("page"+p).classList.add("active");
 stopScanner();
}

// SCANNER
function startScanner(){
 stopScanner();
 scanner=new Html5Qrcode("reader");
 scanner.start({ facingMode:"environment" },{ fps:10, qrbox:250 },text=>{
  barcode.value=text;
  stopScanner();
 });
}

function stopScanner(){
 if(scanner){
  scanner.stop().catch(()=>{});
  scanner=null;
  reader.innerHTML="";
 }
}

// SIMPAN
function simpan(){

 let code=barcode.value;
 let namaBarang=nama.value;
 let jumlahInput=parseInt(jumlah.value)||0;
 let isiPerCrt=parseInt(isi.value)||1;

 if(!code || !namaBarang || jumlahInput<=0){
  alert("Lengkapi data");
  return;
 }

 let qty = satuan.value=="CRT" ? jumlahInput*isiPerCrt : jumlahInput;

 let ref = db.collection("gudang").doc(user.uid).collection("stok").doc(code);

 db.runTransaction(async t=>{
   let doc = await t.get(ref);

   let stokLama = doc.exists ? doc.data().stok : 0;
   let stokBaru = jenis.value=="masuk"
     ? stokLama + qty
     : stokLama - qty;

   if(stokBaru < 0){
     alert("Stok tidak cukup");
     return;
   }

   t.set(ref,{
     nama:namaBarang,
     stok:stokBaru,
     isi:isiPerCrt
   });

   db.collection("gudang").doc(user.uid).collection("riwayat").add({
     nama:namaBarang,
     barcode:code,
     jenis:jenis.value,
     qty:qty,
     waktu:new Date()
   });

 });

 alert("Berhasil disimpan");

 barcode.value="";
 nama.value="";
 jumlah.value="";
}

// LOAD STOK
function loadStok(){
 db.collection("gudang").doc(user.uid).collection("stok")
 .onSnapshot(snap=>{
   dataStok=[];
   snap.forEach(d=>dataStok.push({...d.data(),barcode:d.id}));
   renderStok();
 });
}

// RENDER STOK + SEARCH
function renderStok(){
 let keyword=cari.value?cari.value.toLowerCase():"";
 let html="";

 dataStok
 .filter(x=>x.nama.toLowerCase().includes(keyword) || x.barcode.includes(keyword))
 .forEach(data=>{

   let crt=Math.floor(data.stok/(data.isi||1));
   let pcs=data.stok%(data.isi||1);

   html+=`
   <div class="card">
   <b>${data.nama}</b><br>
   ${data.barcode}<br>
   ${crt} CRT ${pcs} PCS
   </div>`;
 });

 listStok.innerHTML=html||"Tidak ditemukan";
}

// LOAD RIWAYAT + LAPORAN
function loadRiwayat(){
 db.collection("gudang").doc(user.uid).collection("riwayat")
 .orderBy("waktu","desc")
 .onSnapshot(snap=>{
   dataRiwayat=[];
   snap.forEach(d=>dataRiwayat.push(d.data()));
   renderRiwayat();
 });
}

// RENDER RIWAYAT + LAPORAN
function renderRiwayat(){
 let masuk=0, keluar=0;
 let html="";

 dataRiwayat.forEach(x=>{
   if(x.jenis=="masuk") masuk+=x.qty;
   else keluar+=x.qty;

   html+=`
   <div class="card">
   ${x.nama}<br>
   ${x.jenis} : ${x.qty} pcs<br>
   <small>${new Date(x.waktu.seconds*1000).toLocaleString()}</small>
   </div>`;
 });

 laporan.innerHTML=`
 <b>Laporan:</b><br>
 Barang Masuk: ${masuk} pcs<br>
 Barang Keluar: ${keluar} pcs
 `;

 listRiwayat.innerHTML=html||"Belum ada";
}

</script>

</body>
</html>
