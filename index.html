<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Toko</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding:20px; }

/* input */
input, select, button {
  padding:8px;
  margin:5px;
}

/* tabel rapi */
table {
  border-collapse: collapse;
  width:100%;
  margin-top:10px;
  font-size:14px;
}

th {
  background:#f5f5f5;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
}

tr:nth-child(even){
  background:#fafafa;
}

tr:hover{
  background:#f1f1f1;
}

/* tombol hapus halus */
.btn-hapus{
  background:#eee;
  border:none;
  padding:5px 10px;
  cursor:pointer;
  font-size:12px;
}

.btn-hapus:hover{
  background:#ddd;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Login</h2>
  <input type="text" id="user" placeholder="Username"><br>
  <input type="password" id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appPage" class="hidden">

<h2>📦 Input Barang</h2>
<input type="text" id="kode" placeholder="Kode Barang">
<input type="text" id="nama" placeholder="Nama Barang">
<input type="number" id="harga" placeholder="Harga">
<input type="number" id="jumlah" placeholder="Jumlah">

<select id="satuan">
  <option value="pcs">PCS</option>
  <option value="crt">CRT</option>
</select>

<button onclick="tambah()">Barang Masuk</button>
<button onclick="keluar()">Barang Keluar</button>

<hr>

<h2>📋 Stok Barang</h2>

<input type="text" id="search" placeholder="🔍 Cari barang..." onkeyup="renderData()">
<button onclick="printStok()">🖨️ Print</button>

<table id="tabel">
<thead>
<tr>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<div style="margin-top:10px; text-align:right;">
<b>Total Nilai Stok: <span id="totalHarga">Rp 0</span></b>
</div>

</div>

<script>
// LOGIN
function login() {
  const u = val("user");
  const p = val("pass");

  if (u === "admin" && p === "1234") {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");
  } else {
    alert("Login salah!");
  }
}

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// FORMAT RUPIAH
function formatRupiah(angka){
  return "Rp " + angka.toLocaleString("id-ID");
}

// AUTO ISI
document.getElementById("kode").addEventListener("keyup", async function() {
  const kode = kodeVal();
  if (!kode) return;

  const doc = await db.collection("barang").doc(kode).get();

  if (doc.exists) {
    const d = doc.data();
    valSet("nama", d.nama_barang);
    valSet("harga", d.harga);
  }
});

// BARANG MASUK
async function tambah() {
  const kode = kodeVal();
  const nama = val("nama");
  const harga = num("harga");
  const jumlah = num("jumlah");
  const satuan = val("satuan");

  if (!kode || !nama) return alert("Isi data!");

  let total = jumlah;
  if (satuan === "crt") total = jumlah * 24;

  const ref = db.collection("barang").doc(kode);
  const doc = await ref.get();

  if (doc.exists) {
    await ref.update({
      stok: (doc.data().stok || 0) + total
    });
  } else {
    await ref.set({
      nama_barang: nama,
      harga: harga,
      stok: total,
      konversi: 24
    });
  }

  reset();
}

// BARANG KELUAR
async function keluar() {
  const kode = kodeVal();
  const jumlah = num("jumlah");
  const satuan = val("satuan");

  if (!kode || !jumlah) return alert("Isi data!");

  let total = jumlah;
  if (satuan === "crt") total = jumlah * 24;

  const ref = db.collection("barang").doc(kode);
  const doc = await ref.get();

  if (!doc.exists) return alert("Barang tidak ada");

  let stok = doc.data().stok || 0;
  if (stok < total) return alert("Stok kurang!");

  await ref.update({ stok: stok - total });

  reset();
}

// HAPUS
function hapus(id) {
  db.collection("barang").doc(id).delete();
}

// SIMPAN DATA GLOBAL
let semuaData = [];

// AMBIL DATA
db.collection("barang").onSnapshot((snap) => {
  semuaData = [];
  snap.forEach(doc=>{
    semuaData.push({id:doc.id, ...doc.data()});
  });
  renderData();
});

// RENDER + SEARCH
function renderData(){
  const list = document.getElementById("list");
  const keyword = val("search").toLowerCase();
  list.innerHTML = "";

  let no = 1;
  let totalSemua = 0;

  semuaData.forEach(d => {

    if (
      d.nama_barang.toLowerCase().includes(keyword) ||
      d.id.toLowerCase().includes(keyword)
    ) {

      const crt = Math.floor(d.stok / 24);
      const sisa = d.stok % 24;

      const stokTampil = `${d.stok} pcs (${crt} crt + ${sisa} pcs)`;

      const total = d.stok * d.harga;
      totalSemua += total;

      list.innerHTML += `
        <tr>
          <td>${no++}</td>
          <td>${d.id}</td>
          <td>${d.nama_barang}</td>
          <td>${stokTampil}</td>
          <td>${formatRupiah(d.harga)}</td>
          <td><button class="btn-hapus" onclick="hapus('${d.id}')">Hapus</button></td>
        </tr>
      `;
    }
  });

  document.getElementById("totalHarga").innerHTML = formatRupiah(totalSemua);
}

// PRINT
function printStok(){
  const isi = document.getElementById("tabel").outerHTML;

  const win = window.open('', '', 'width=800,height=600');
  win.document.write(`
    <html>
    <head>
    <style>
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid black;padding:5px}
    </style>
    </head>
    <body>
    <h2 style="text-align:center">STOK BARANG</h2>
    ${isi}
    </body>
    </html>
  `);

  win.document.close();
  win.print();
}

// HELPER
function val(id){ return document.getElementById(id).value }
function valSet(id,v){ document.getElementById(id).value = v }
function num(id){ return parseInt(val(id)) || 0 }
function kodeVal(){ return val("kode").trim() }

function reset(){
  ["kode","nama","harga","jumlah"].forEach(id=>valSet(id,""))
}
</script>

</body>
</html>
