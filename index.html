<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Toko</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }

input, select, button {
  padding:8px;
  margin:5px;
}

/* tabel */
table {
  border-collapse: collapse;
  width:100%;
  margin-top:10px;
  font-size:14px;
}

th {
  background:#f5f5f5;
}

th, td {
  border:1px solid #ddd;
  padding:8px;
}

tr:nth-child(even){ background:#fafafa; }
tr:hover{ background:#f1f1f1; }

.hidden { display:none; }

/* dropdown */
.menu {
  position: relative;
}
.menu-btn {
  border:none;
  background:transparent;
  cursor:pointer;
}
.menu-content {
  display:none;
  position:absolute;
  right:0;
  background:white;
  border:1px solid #ddd;
}
.menu:hover .menu-content {
  display:block;
}
.menu-content button {
  border:none;
  background:none;
  padding:8px;
  cursor:pointer;
}
.menu-content button:hover {
  background:#eee;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>🔐 Login</h2>
  <input type="text" id="user" placeholder="Username"><br>
  <input type="password" id="pass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appPage" class="hidden">

<h2>📦 Input Barang</h2>
<input id="kode" placeholder="Kode">
<input id="nama" placeholder="Nama">
<input id="harga" type="number" placeholder="Harga">
<input id="jumlah" type="number" placeholder="Jumlah">

<select id="satuan">
  <option value="pcs">PCS</option>
  <option value="crt">CRT</option>
</select>

<button onclick="tambah()">Masuk</button>
<button onclick="keluar()">Keluar</button>

<hr>

<h2>📋 Stok Barang</h2>

<input id="search" placeholder="🔍 Cari..." onkeyup="renderData()">
<button onclick="printStok()">🖨️ Print</button>
<button onclick="exportPDF()">📄 PDF</button>

<div id="areaPrint">
<table id="tabel">
<thead>
<tr>
<th>No</th>
<th>Kode</th>
<th>Nama</th>
<th>Stok</th>
<th>Harga</th>
<th></th>
</tr>
</thead>

<tbody id="list"></tbody>

<tfoot>
<tr>
<td colspan="4" align="right"><b>Total</b></td>
<td><b id="totalHarga">Rp 0</b></td>
<td></td>
</tr>
</tfoot>

</table>
</div>

</div>

<script>
// LOGIN
function login(){
  if(val("user")=="admin" && val("pass")=="1234"){
    loginPage.classList.add("hidden");
    appPage.classList.remove("hidden");
  } else alert("Salah");
}

const firebaseConfig = {
  apiKey: "AIzaSyD3YTIsKwI6yTwabSwI97ZxG4B81GoQbis",
  authDomain: "gudang-app-8320e.firebaseapp.com",
  projectId: "gudang-app-8320e",
  storageBucket: "gudang-app-8320e.firebasestorage.app",
  messagingSenderId: "1083922080078",
  appId: "1:1083922080078:web:59a37f73bf8ec33ffd7e1f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// FORMAT
function formatRupiah(a){
  return "Rp "+a.toLocaleString("id-ID");
}

// AUTO ISI
kode.onkeyup = async ()=>{
  let doc = await db.collection("barang").doc(kodeVal()).get();
  if(doc.exists){
    nama.value = doc.data().nama_barang;
    harga.value = doc.data().harga;
  }
};

// MASUK
async function tambah(){
  let k=kodeVal(), n=val("nama"), h=num("harga"), j=num("jumlah");
  let t = (val("satuan")=="crt")? j*24 : j;

  let ref=db.collection("barang").doc(k);
  let doc=await ref.get();

  if(doc.exists){
    await ref.update({stok:(doc.data().stok||0)+t});
  } else {
    await ref.set({nama_barang:n,harga:h,stok:t});
  }
  reset();
}

// KELUAR
async function keluar(){
  let k=kodeVal(), j=num("jumlah");
  let t=(val("satuan")=="crt")? j*24:j;

  let ref=db.collection("barang").doc(k);
  let doc=await ref.get();

  if(!doc.exists) return alert("Tidak ada");
  let s=doc.data().stok;
  if(s<t) return alert("Kurang");

  await ref.update({stok:s-t});
  reset();
}

// HAPUS
function hapus(id){
  db.collection("barang").doc(id).delete();
}

// DATA
let semuaData=[];
db.collection("barang").onSnapshot(snap=>{
  semuaData=[];
  snap.forEach(d=>semuaData.push({id:d.id,...d.data()}));
  renderData();
});

// RENDER
function renderData(){
  list.innerHTML="";
  let key=val("search").toLowerCase();
  let total=0, no=1;

  semuaData.forEach(d=>{
    if(d.nama_barang.toLowerCase().includes(key)||d.id.includes(key)){

      let crt=Math.floor(d.stok/24);
      let pcs=d.stok%24;

      let stok="";
      if(crt>0&&pcs>0) stok=`${crt} crt + ${pcs} pcs`;
      else if(crt>0) stok=`${crt} crt`;
      else stok=`${pcs} pcs`;

      total+=d.stok*d.harga;

      list.innerHTML+=`
      <tr>
        <td>${no++}</td>
        <td>${d.id}</td>
        <td>${d.nama_barang}</td>
        <td>${stok}</td>
        <td>${formatRupiah(d.harga)}</td>
        <td>
          <div class="menu">
            <button class="menu-btn">⋮</button>
            <div class="menu-content">
              <button onclick="hapus('${d.id}')">Hapus</button>
            </div>
          </div>
        </td>
      </tr>`;
    }
  });

  totalHarga.innerHTML=formatRupiah(total);
}

// PRINT
function printStok(){
  let w=window.open();
  w.document.write("<h2>STOK</h2>"+tabel.outerHTML);
  w.print();
}

// PDF
function exportPDF(){
  html2pdf().from(areaPrint).save("stok-barang.pdf");
}

// HELPER
function val(id){return document.getElementById(id).value}
function num(id){return parseInt(val(id))||0}
function kodeVal(){return val("kode").trim()}
function reset(){["kode","nama","harga","jumlah"].forEach(i=>document.getElementById(i).value="")}
</script>

</body>
</html>
